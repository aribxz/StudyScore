</head>

<body>

<div class="container">

<div class="left">

<!-- 🔥 Mode Switch -->

<div class="mode-toggle">
<button onclick="setMode('buttons')" class="active-btn" id="btnMode">Buttons</button>
<button onclick="setMode('manual')" id="manualMode">Manual</button>
</div>

<!-- 🔥 BUTTON INPUTS -->

<div id="buttonInputs">

<h3>Hours</h3>
<div id="hours">
<div class="option" onclick="select(this,'hours',2)">Low</div>
<div class="option" onclick="select(this,'hours',5)">Med</div>
<div class="option" onclick="select(this,'hours',9)">High</div>
</div>

<h3>Tests</h3>
<div id="tests">
<div class="option" onclick="select(this,'tests',2)">Low</div>
<div class="option" onclick="select(this,'tests',6)">Med</div>
<div class="option" onclick="select(this,'tests',12)">High</div>
</div>

<h3>Sleep</h3>
<div id="sleep">
<div class="option" onclick="select(this,'sleep',4)">Bad</div>
<div class="option" onclick="select(this,'sleep',7)">Good</div>
<div class="option" onclick="select(this,'sleep',9)">Perfect</div>
</div>

<h3>Phone</h3>
<div id="phone">
<div class="option" onclick="select(this,'phone',8)">High</div>
<div class="option" onclick="select(this,'phone',4)">Med</div>
<div class="option" onclick="select(this,'phone',1)">Low</div>
</div>

</div>

<!-- 🔥 MANUAL INPUT -->

<div class="manual-input" id="manualInput">
<input type="number" placeholder="Hours" id="m_hours">
<input type="number" placeholder="Tests" id="m_tests">
<input type="number" placeholder="Sleep" id="m_sleep">
<input type="number" placeholder="Phone" id="m_phone">
<button onclick="manualPredict()">Predict</button>
</div>

</div>

<div class="right">

<div class="score" id="score">--</div>

<div class="bar-container">
<div class="bar" id="bar"></div>
</div>

<div id="insight" class="insight"></div>

<div class="graph-buttons">
<button onclick="activateBtn(this); showMain()">Overview</button>
<button onclick="activateBtn(this); showGraph('hours')">Hours</button>
<button onclick="activateBtn(this); showGraph('tests')">Tests</button>
<button onclick="activateBtn(this); showGraph('sleep')">Sleep</button>
<button onclick="activateBtn(this); showGraph('phone')">Phone</button>
</div>

<canvas id="chart"></canvas>

</div>

</div>

<script>
let data = {hours:null,tests:null,sleep:null,phone:null};
let chart, savedGraphs;

/* 🔥 Mode Switch */
function setMode(mode){
document.getElementById("buttonInputs").style.display = mode==="buttons"?"block":"none";
document.getElementById("manualInput").style.display = mode==="manual"?"block":"none";

document.querySelectorAll(".mode-toggle button").forEach(b=>b.classList.remove("active-btn"));
document.getElementById(mode==="buttons"?"btnMode":"manualMode").classList.add("active-btn");
}

/* 🔥 Button Selection */
function select(el,type,value){
document.querySelectorAll("#"+type+" .option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");
data[type]=value;

if(data.hours && data.tests && data.sleep && data.phone){
predict(data);
}
}

/* 🔥 Manual Predict */
function manualPredict(){
data.hours = document.getElementById("m_hours").value;
data.tests = document.getElementById("m_tests").value;
data.sleep = document.getElementById("m_sleep").value;
data.phone = document.getElementById("m_phone").value;

predict(data);
}

/* 🔥 Predict */
function predict(payload){
fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})
.then(res=>res.json())
.then(res=>{
document.getElementById("score").innerText=res.score;
document.getElementById("insight").innerText=res.insight;

savedGraphs=res;
drawBar(res.score);
showMain();
});
}

function drawBar(score){
document.getElementById("bar").style.width=score+"%";
}

function activateBtn(btn){
document.querySelectorAll(".graph-buttons button").forEach(b=>b.classList.remove("active-btn"));
btn.classList.add("active-btn");
}

function showMain(){
updateChart(savedGraphs.graph);
}

function showGraph(type){
let values=savedGraphs.individual_graphs[type];
let labels=[];

if(type==="hours"){ for(let i=1;i<=10;i++) labels.push(i); }
if(type==="tests"){ for(let i=1;i<=15;i++) labels.push(i); }
if(type==="sleep"){ for(let i=3;i<=10;i++) labels.push(i); }
if(type==="phone"){ for(let i=1;i<=10;i++) labels.push(i); }

updateChart(Object.fromEntries(labels.map((l,i)=>[l,values[i]])));
}

function updateChart(dataObj){
let labels=Object.keys(dataObj);
let values=Object.values(dataObj);

if(chart){ chart.destroy(); }

let ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:"line",
data:{labels:labels,datasets:[{data:values}]},
options:{plugins:{legend:{display:false}},animation:{duration:800}}
});
}
</script>

</body>
</html>
